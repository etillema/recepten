naam: Gestoofde prei en venkel
categorie: Bijgerecht
keuken: Nederlands
bereidingstijd: 55
ingredienten:
- 2 kleine preien
- 2 kleine venkelknollen
- boter
- peper en zout
stappen:
- Snijd de prei in stukjes en maak deze schoon.
- Verhit de boter in een pan en voeg de prei toe. Bak de prei in circa 5 minuten zacht (let op, niet bruin laten worden).
- Snijd de venkel in dunne plakjes en voeg deze aan de prei toe. Bak de venkel nog circa een minuut mee.
- Voeg peper, zout en water toe en stoof de prei met venkel nog voor circa 40 tot 45 minuten.
