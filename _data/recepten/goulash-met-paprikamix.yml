naam: Goulash met paprikamix
categorie: Stoofgerecht
keuken: Hongaars
bereidingstijd: 180
ingredienten:
  - 500 gram rundvlees
  - boter
  - 1 eetlepel bloem
  - scheutje rode wijn
  - 4 uien
  - 2 paprika's
  - 2 blaadjes laurier
  - 2 theelepels paprikapoeder
  - 500 ml tomaten passata
  - 500 gram krielaardappeltjes
  - peper en zout
stappen:
  - Snijd de ui en paprika's grof en fruit deze.
  - Snijd het rundvlees in blokjes en bak deze rondom bruin. Voeg aan het eind een eetlepel bloem toe.
  - Voeg de uien en de paprika toe aan het vlees. Voeg de passata en eventueel een scheutje rode wijn toe. Voeg de laurierblaadjes toe.
  - Stoof het vlees in circa 2,5 tot 3 uur gaar.
  - Voeg het laatste 30 minuten de krielaardappeltjes toe.
tags:
  - stoofvlees
  - rundvlees
  - Hongaars
  - paprika
  - winters
