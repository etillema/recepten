naam: Zwolsche Pie met rundvlees en pompoen
categorie: Stoofgerecht
bereidingstijd: 45
personen: 6
ingredienten:
  - 2 el Euroma kruidenmix Zwolsche Stoof
  - 1 kg rib/runderlappen
  - 175 g koude boter
  - 2 uien
  - 400 g pastinaak
  - 200 g spekreepjes
  - 750 ml kippenbouillon
  - 150 ml medium sherry
  - 285 g bloem
  - 130 g roomkaas
  - 4 el appelciderazijn
  - 1 tl bakpoeder
  - 1 tl zout
  - 800 g pompoen
  - 6 el olie
  - 1 ei
stappen:
  - Snijd het vlees in stukken van 2 cm.
  - Verhit 25 g boter in een braadpan, bestrooi het vlees met peper en zout en bak in 2 delen in 10 min. rondom bruin.
  - Snijd de ui in halve ringen, schil de pastinaak en snijd in stukken van 2 cm.
  - Neem het vlees uit de pan en bak de ui, pastinaak, Zwolsche Stoof en spek 5 minuten.
  - Doe het vlees terug in de pan en voeg de bouillon en sherry toe.
  - Breng op hoog vuur aan de kook. Laat 3 uur op laag vuur garen zonder deksel. Zorg ervoor dat de saus goed is ingedikt.
  - Snijd ondertussen de rest van de boter in stukjes.
  - Maal de boter in de keukenmachine met bloem, roomkaas, 1,5 el azijn, bakpoeder, 1 el water en zout tot een samenhangend deeg.
  - Wikkel het deeg in vershoudfolie en druk plat. Laat minimaal 1 uur rusten in de koelkast.
  - Verwarm de oven voor op 200 °C.
  - Verwijder de zaden en draderige binnenkant van de pompoen.
  - Snijd het vruchtvlees met schil in repen van 1 cm breed en verdeel over een met bakpapier beklede bakplaat.
  - Besprenkel met 1 el olie en bestrooi met zout.
  - Rooster ca. 30 min. in het midden van de oven goudbruin en gaar.
  - Neem de pan van het vuur als het vlees gaar is en draai de oven terug naar 180 °C.
  - Verdeel het vlees over de bodem van de pievorm en leg de pompoenplakken erop.
  - Rol het deeg uit tot een ronde lap van ca. 3 mm dik. Leg het deeg op de vulling en druk de randen aan.
  - Splits het ei, klop de dooier los en bestrijk de bovenkant ermee. Maak met een mes een aantal inkepingen.
  - Bak de pie ca. 45 min. in het midden van de oven goudbruin en gaar.
  - Neem uit de oven en laat 10 min. afkoelen.
