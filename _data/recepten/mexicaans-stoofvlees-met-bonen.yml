naam: Mexicaans stoofvlees met bonen
categorie: Hoofdgerecht
keuken: Mexicaans
bereidingstijd: 270
ingredienten:
- 100 gram chorizo
- 3 uien
- 800 gram rundvlees
- 1 el Al-Andalus
- 3 theelepels tabasco
- 2 theelepels gedroogde oregano
- 2 eetlepels bloem
- 2 blikken a 400 gram tomatenblokjes
- 2 blikken a 400 gram borlottibonen
- peper en zout
- 24 tacoschelpen
stappen:
- Snijd de chorizo in blokjes en bak deze in een braadpan zonder olie of boter toe te voegen. Bak de chorizo voor een paar minuten.
- Snijd de ui in ringen en voeg deze aan de chorizo toe. Laat de uien in circa 5 minuten zacht worden.
- Snijd het rundvlees in blokken van 2 x 2 cm en meng de kruiden, bloem en tabasco door het vlees. Voeg het vlees toe aan de chorizo en bak dit rondom bruin.
- Voeg de tomatenblokjes toe en laat het vlees 4 uur stoven.
- Voeg 15 minuten voor het serveren de bonen aan het stoofvlees toe. Warm de bonen door.
- Verwarm de tacoschelpen in de oven volgens de verpakking.
tips:
- Lekker met een salade met een zoete dressing.
tags:
- hoofdgerecht
