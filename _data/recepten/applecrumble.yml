naam: Applecrumble
categorie: Nagerecht
keuken: Engels
bereidingstijd: 15
oventemperatuur: 175
oventijd: 30
ingredienten:
- 5 appels
- sinaasappelsap
- 1 theelepel gemalen kruidnagel
- 100 gram suiker
- 50 gram bloem
- 6 eetlepels havermout
- 65 gram gemalen hazelnoot
- 75 gram boter
- creme fraiche
stappen:
- Schil de appel en snijd deze in blokjes. Meng de sinaasappel en kruidnagel met de
  appel.
- Meng de suiker, bloem, havermout, hazelnoot en boter tot een kruimeldeeg.
- Doe de appel in ovenschaaltjes en verdeel het kruimeldeeg erover.
- Bak de appelcrumble in circa 30 minuten op 175 graden af.
tips:
- Serveren met een beetje creme fraiche.
tags:
- bakken
- Engels
- appel
- crumble
- oven
