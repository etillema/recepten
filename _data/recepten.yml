- naam: Appeltaart
  categorie: Taart en koekjes
  bereidingstijd: 90
  personen: 8
  ingredienten:
    - 300g bloem
    - 200g boter
    - 4 appels
    - 2 eieren
    - 100g suiker
  stappen:
    - Meng bloem en boter tot kruimels.
    - Voeg eieren en suiker toe en kneed tot deeg.
    - Druk in een ingevette vorm.
    - Schil de appels en snijd in stukjes.
    - Verdeel over het deeg.
    - Bak 45 minuten op 180°C tot goudbruin.
  notities: "De taart is het lekkerst als je hem een dag van tevoren maakt."

- naam: Spaghetti Aglio e Olio
  categorie: Pasta en Rijst
  bereidingstijd: 20
  personen: 4
  ingredienten:
    - 400g spaghetti
    - 6 teentjes knoflook
    - 150ml olijfolie
    - rode peper
    - zout
    - peterselie
  stappen:
    - Kook de spaghetti volgens aanwijzing totdat deze al dente is.
    - Snijd knoflook fijn.
    - Verhit olijfolie in een grote pan op laag vuur.
    - Voeg knoflook toe en bruis zachtjes totdat deze goudgeel is.
    - Voeg rode peper toe.
    - Giet afgekookte pasta in de pan en meng goed.
    - Bestrooi met vers gehakte peterselie.
  notities: "Dit is een klassieker uit Napels — simpel, snel en veel smaak."
