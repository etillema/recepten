naam: Duitse Worstsalade
categorie: Salade
keuken: Duits
bereidingstijd: 20
wachttijd: 2 uur (koelen in de koelkast)
ingredienten:
- 150 gram worst
- 150 gram jonge kaas
- 80 gram augurk
- 1 rode ui
- 3 eetlepels witte wijn azijn
- 1-2 eetlepels suiker
- 1 theelepel mosterd
- 2-3 eetlepels olie
- peper en zout
- bieslook en peterselie
stappen:
- Snijd de worst, kaas en augurk in dunne slierten. Snijd de ui in dunne ringen.
- Doe de uiringen in een vergiet en spoel ze af met kokend water (wordt de ui minder scherp).
- Meng de azijn, suiker, mosterd, peper, zout en olie.
- Giet de dressing over het mengsel worst, kaas, ui en augurk.
- Laat de salade 2 uur in de koelkast staan voordat je hem serveert.
- Garneer de salade met bieslook en peterselie.
