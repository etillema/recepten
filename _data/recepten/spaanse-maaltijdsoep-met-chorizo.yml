naam: Spaanse maaltijdsoep met chorizo
categorie: Soep
keuken: Spaans
bereidingstijd: 20
ingredienten:
- 2 uien in halve ringen
- 1 pakje tomatensaus
- 1 chorizo worst
- 1 zak paprikamix
- 2 blikjes kikkererwten
- 1 theelepel gemalen komijn
- 1 runderbouillon
stappen:
- Bak de chorizo 1 minuut in een soeppan. Voeg de ui, paprika en komijn toe en bak deze 4 minuten mee.
- Voeg de tomatensaus, de kikkererwten, en 750 milliliter bouillon toe en laat de soep 6 minuten koken.
- Voeg peper en zout toe naar smaak.
tips:
- Lekker met stokbrood.
tags:
- soep
- chorizo
- Spaans
- snel klaar
- kikkererwten
