naam: Boef Bourguignon
categorie: Stoofvlees
keuken: Frans
bereidingstijd: 3
ingredienten:
- 750 gram rundvlees
- een restje rode wijn
- 1 eetlepel bloem
- 2 laurierblaadjes
- 4 tot 6 kruidnagels
- 4 grote uien
- 125 gram rookspekjes
- circa 30 zilveruitjes
- 150 gram champignon
- 1 blikje tomatenpuree
- boter
- peper en zout
stappen:
- Snijd de ui in stukjes en bak deze in boter goudbruin. Voeg de spekblokjes toe en
  bak deze mee. Voeg de zilveruitjes toe en laat deze meewarmen.
- Bak het rundvlees in boter in een braadpan rondom bruin. Meng de bloem door het
  vlees en laat deze bruin kleuren.
- Voeg het mengsel uien, spek, zilveruitjes aan het vlees toe. Voeg de laurier en
  de kruidnagel toe en laat het vlees 2,5 tot 3 uur stoven.
- Voeg aan het eind de tomatenpuree en de fijngesneden champignons toe. Maak het
  geheel op smaak met peper en zout.
tips:
- Lekker met aardappelpuree.
