naam: Siciliaans stoofvlees
categorie: Stoofgerecht
keuken: Italiaans
bereidingstijd: 150
ingredienten:
  - 800 gram rundvlees
  - olijfolie
  - 2 uien
  - 1 blikje tomatenblokjes
  - 1/2 liter rode wijn
  - 3 teentjes knoflook in plakjes
  - bouillonblokje
  - bloem
  - boter
  - 2 takjes tijm
  - 1 aubergine
  - 2 stengels bleekselderij
  - 50 gram zwarte olijven
  - 2 eetlepels kappertjes
  - peper en zout
stappen:
  - Snijd de ui grof.
  - Fruit de ui en de knoflook in de olie. Voeg de tomaat, bouillon en wijn toe en laat het 5 minuten pruttelen.
  - Snijd het rundvlees in blokjes en bak het in een braadpan in boter rondom bruin. Voeg een eetlepel bloem toe en laat dit mee garen.
  - Voeg het uien-tomaat mengsel toe aan het vlees. Voeg de tijm toe en laat het vlees in circa 2 uur gaar stoven.
  - Snijd de aubergine in blokjes en bestrooi de blokjes met zout. Laat de aubergine uitlekken.
  - Spoel de aubergine af met water en dep droog. Bak de blokjes in olijfolie rondom bruin.
  - Snijd de bleekselderij in stukjes.
  - Voeg de aubergine, bleekselderij, olijven en kappertjes toe aan het stoofvlees en laat het geheel nog circa 15 minuten doorwarmen. Breng op smaak met peper en zout.
tips:
  - Lekker met rijst, risotto of een ciabatta.
tags:
