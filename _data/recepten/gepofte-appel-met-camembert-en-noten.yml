naam: Gepofte appel met camembert en noten
categorie: Bijgerecht
keuken: Frans
bereidingstijd: 10
oventemperatuur: 175
oventijd: 30
ingredienten:
- 4 kleine handappels
- 75 gram camembert
- een handje noten of geroosterde pijnboompitten
- honing
- aluminium folie
stappen:
- Boor het klokhuis uit de appel.
- Snijd de kaas in blokjes en meng het met de honing en de noten of pijnboompitten.
- Vul de holte in de appel met het kaas-noten-honing mengsel.
- Pak de appel in een folie en plaats de appel in een ovenschaal.
- Verwarm de appel 30 minuten in de oven op 175 graden.
