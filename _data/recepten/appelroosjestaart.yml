naam: Appelroosjestaart
categorie: Bijgerecht
bereidingstijd: 30
personen: 6
ingredienten:
  - 5 à 6 appels, bijv. Elstar
  - 1/2 citroen, uitgeperst
  - 2 rollen koelvers bladerdeeg
  - 50 g suiker gemengd met 2 tl kaneel
  - 1 klontje boter
stappen:
  - Was de appels en snijd ze in kwarten. Verwijder de klokhuizen en snijd de kwarten in zo dun mogelijke plakjes.
  - Leg de appelplakjes in een kom samen met het citroensap en een flinke laag water. Hussel alles even om.
  - Zet de kom in de magnetron en 'kook' de plakjes tot ze niet helemaal gaar zijn, maar wel wat slapper zijn geworden. (indicatie 4 x 1 minuut)
  - Haal het bladerdeeg vijf minuten van tevoren uit de koelkast. Vet een quiche- of springvorm goed in met het klontje boter.
  - Rol het bladerdeeg uit en snijd er repen van met een hoogte van 3 centimeter.
  - Leg de appelplakjes deels overlappend op de repen bladerdeeg en bestrooi ze met wat kaneelsuiker.
  - Rol de repen losjes op en zet ze rechtop in de quichevorm. Rol de roosjes niet te strak op, anders wordt het bladerdeeg niet gaar.
  - Maak eerst de buitenste rand van de taart en werk zo naar binnen toe.
  - Zet de taart in een op 175 graden voorverwarmde oven en bak haar in 45-50 minuten goudbruin en gaar.
