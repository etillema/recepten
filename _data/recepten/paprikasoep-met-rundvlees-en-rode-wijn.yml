naam: Paprikasoep met rundvlees en rode wijn
categorie: Soep
keuken: Nederlands
bereidingstijd: 150
ingredienten:
- 3 sjarlotjes of een grote ui
- 2 teentjes knoflook
- 400 gram runderpoulet
- 70 gram tomatenpuree
- 150 ml rode wijn
- 1500 ml vleesbouillon
- 3 paprika's in verschillende kleuren
- een takje tijm
stappen:
- Snipper de sjarlotjes en knoflook en fruit deze 2 a 3 minuten in wat olijfolie.
- Voeg de runderpoulet toe en bak deze rondom bruin.
- Schep de tomatenpuree erdoor en bak deze 1 a 2 minuten mee.
- Giet de wijn en bouillon en tijm toe en laat de soep 1,5 a 2 uur doorkoken.
- Voeg op het laatst de in reepjes gesneden paprika toe en laat deze nog 15 minuten meekoken.
- Breng de soep op smaak met peper en zout.
