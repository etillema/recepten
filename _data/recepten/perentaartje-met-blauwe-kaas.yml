naam: Perentaartje met blauwe kaas
categorie: Ovengerecht
bereidingstijd: 30
personen: 3
ingredienten:
  - 3 handperen
  - 6 plakjes bladerdeeg
  - 1 el melk
  - 50 g zachte blauwschimmelkaas
  - 50 g brie
  - 2 el gehakte walnoten
  - 1 el honing
stappen:
  - Halveer de peren en schil ze voorzichtig.
  - Verwijder het klokhuis (met een lepeltje of een meloenbolletjesmaker), maar laat het steeltje zitten.
  - Leg de peren met de snijkant naar beneden op een met bakpapier beklede bakplaat.
  - Dep de peren een beetje droog met keukenpapier.
  - Leg op elke peer een (ontdooid) plakje bladerdeeg.
  - Vouw het bladerdeeg om de peer, op zo'n manier dat er geen lucht tussen de peer en het deeg achterblijft.
  - Snijd rondom het deeg af; houd ongeveer een halve centimeter rand aan om de peer.
  - Snijd uit het restant deeg wat kleine blaadjes en leg deze bij de steeltjes.
  - Prik met de punt van een mes hier en daar kleine gaatjes in het deeg.
  - Bestrijk het deeg met een kwastje met een beetje melk.
  - Bak de peren 15 tot 20 minuten in een voorverwarmde oven op 200 graden tot ze mooi goudbruin zijn.
  - Draai de peren om en vul het holletje van het klokhuis met een mengsel van blauwschimmelkaas en zachte brie.
  - Bestrooi met wat gehakte walnoten en een straaltje honing om het af te maken.
