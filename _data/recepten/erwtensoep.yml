naam: Erwtensoep
categorie: Soep
keuken: Nederlands
bereidingstijd: 2
ingredienten:
- 250 gram spliterwten
- 1 1/4 liter water
- 100 gram rookspek
- 250 gram hamlappen
- 2 bouillonblokjes
- peper
- laurier
- 1/4 knolselderij
- 1 ui
- 1 prei
- 1 aardappel
- 1 winterwortel
- kruidnagelpoeder
- rookworst
- zout
stappen:
- Spliterwten wassen en in water aan de kook brengen. Schuim met schuimspaan verwijderen.
- Rookspek, hamlappen, bouillonblokjes, peper en laurierblad toevoegen en circa 1
  uur laten koken.
- Knolselderij, ui, prei, aardappel en winterpeen in blokjes snijden en aan de soep
  toevoegen. Soep nogmaals een uur laten koken.
- Rookworst in de soep of separaat verwarmen. Soep op smaak brengen met peper en
  zout.
