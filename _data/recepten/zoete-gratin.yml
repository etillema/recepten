naam: Zoete gratin
categorie: Ovengerecht
bereidingstijd: 20
oventemperatuur: 180
oventijd: 45
personen: 4
ingredienten:
  - 500 gram perzikken (of abrikozen) op siroop
  - 250 gram schelpjes macaroni
  - 250 ml melk
  - 1 zakje vanillesuiker
  - 50 gram suiker
  - 3 eieren
  - 200 gram mascarpone
  - 125 gram zure room
  - kaneel
stappen:
  - Voeg het zakje vanillesuiker aan de melk toe, en kook de pasta hierin gaar.
  - Splits de eieren en klop het eiwit stijf.
  - Klop de eidooiers romig en voeg de zure room, de mascarpone en de suiker toe.
  - Meng het eiwit door het eidooiermengsel. Voeg de gaargekookte pasta toe.
  - Verdeel het pastamengsel over een ingevette overschaal. Verdeel de perzikken over de pasta. Bestrooi de gratin met kaneel.
  - Bak de gratin op 175 graden in circa 40 minuten gaar.
tags:
