naam: Veldsla met geitenkaas en frambozen
categorie: Salades
bereidingstijd: 15
personen: 2
ingredienten:
  - veldsla
  - frambozen
  - pijnboompitten
  - bosuitje
  - verse geitenkaas
  - azijn
  - olijfolie
  - peper en zout
stappen:
  - Maak de sla schoon en verdeel deze in porties.
  - Maak een vinaigrette van de olie, azijn, peper en zout.
  - Rooster de pijnboompitten goudbruin.
  - Snijd de geitenkaas in kleine stukjes.
  - Verdeel de geitenkaas, pijnboompitten en frambozen over de sla.
tags:
  - salade
  - geitenkaas
  - frambozen
  - vegetarisch
  - snel klaar
