naam: Halloumi & Butternut Squash Orzo Ovenschotel
categorie: Hoofdgerecht
bereidingstijd: 5
personen: 4
ingredienten:
  - 1 rode ui, gepeld en in parten gesneden
  - 500 g flespompoen, bij voorkeur in blokjes uit de diepvries
  - 3 teentjes knoflook, geperst
  - 2 theelepels olijfolie
  - 1 theelepel paprikapoeder
  - 300 g droge orzo
  - 700 ml groentebouillon
  - 250 g cherrytomaten
  - 2 eetlepels pesto
  - 225 g halloumi, in blokjes gesneden
  - zout en peper naar smaak
stappen:
  - Verwarm de oven voor op 200 °C.
  - Meng de ui, flespompoen, knoflook, olijfolie, paprikapoeder, zout en peper in een ovenschaal. Bak gedurende 30 minuten.
  - Voeg de orzo, bouillon, tomaten en pesto toe; meng goed.
  - Leg de halloumi bovenop en bak nog eens 15-25 minuten tot het goudbruin is.
tags:
  - hoofdgerecht
  - overschotel
  - vegetarisch
  - halloumi
  - orzo
  - pompoen
