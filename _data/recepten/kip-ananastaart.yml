naam: Kip Ananastaart
categorie: Ovengerecht
keuken: Nederlands
bereidingstijd: 30
oventemperatuur: 180
oventijd: 50
ingredienten:
- Deeg
- 200 gram bloem
- 125 gram koude boter
- 2 a 3 eetlepels water
- 1 a 2 druppels azijn
- Vulling
- 400 gram kipfilet
- 1 theelepel gemberpoeder
- 1 theelepel kerrie
- 10 bolletjes gember
- 500 ml blik ananas
- 3 eieren
- 4 eetlepels crème fraîche
stappen:
- Zeef de bloem en meng het met de boter, water, azijn en een beetje zout tot een bal. Bekleed een springvorm en laat de vorm op een koude plaats rusten.
- Snijd de kip in blokjes en kruid deze met de gemberpoeder, kerrie, peper en zout. Verhit boter in een pan en bak de kip rondom bruin.
- Snijd de gemberbolletjes en ananas fijn. Meng de kipblokjes bij de ananas en de gember.
- Klop 3 eieren los en meng de crème fraîche erdoor. Voeg naar smaak peper en zout toe.
- Vul de vorm met het kip-ananas mengsel en verdeel de eieren over de kip.
- Bak de taart in circa 50 minuten op 180 graden af.
