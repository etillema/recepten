naam: Appel uien taart
categorie: Nagerecht
keuken: Duits
bereidingstijd: 30
wachttijd: 30
oventemperatuur: 175
oventijd: 45-50
personen: 8

ingredienten:
  - "Deeg:"
  - 200g bloem
  - 1 theelepel bakpoeder
  - 100g kwark
  - 4 eetlepels melk
  - 4 eetlepels olie
  - beetje zout
  - "Vulling:"
  - 4 a 5 appels
  - 400g uien
  - 50g hazelnoten
  - 150g spek
  - 200ml zure room
  - 80g emmentaler
  - 4 eetlepels crème fraîche
  - 3 eieren
  - peper en zout

stappen:
  - Kneed het deeg van de bloem, bakpoeder, kwark, melk, olie en zout tot een bal en laat het op een koele plaats 30 minuten rusten.
  - Snijd de uien in halve ringen en bak deze. Voeg de plakjes spek toe en bak deze mee.
  - Snijd de appel in plakjes.
  - Bekleed een bakvorm met het deeg en vul de vorm laagje voor laagje met het ui/spek mengsel en de appel.
  - Meng de eieren, zure room, crème fraîche en peper en zout en verdeel het mengsel over de vulling van de taart.
  - Verdeel de geraspte kaas over de taart.
  - Bak de taart in 45 tot 50 minuten af op 175 graden.

