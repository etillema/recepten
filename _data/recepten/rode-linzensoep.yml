naam: Rode linzensoep
categorie: Soep
bereidingstijd: 20
personen: 4
ingredienten:
  - 150 gram gedroogde rode linzen
  - 400 gram tomatenblokjes (uit blik)
  - 1 ui
  - 2 teentjes knoflook
  - 0,5 rode peper
  - 1 cm verse gember
  - 750 milliliter kippenbouillon
  - 4 eetlepels zure room
  - 1 theelepel komijn
  - 2 theelepels garam masala
  - 3 takjes verse peterselie
  - chilivlokken en zout
  - olijfolie
stappen:
  - Spoel de linzen goed af in een zeef, laat uitlekken.
  - Pel en snipper de ui en hak de knoflook en de rode peper fijn. Fruit dit aan in wat olijfolie.
  - Voeg de garam masala en de komijn toe. Rasp de gember en bak dit kort mee.
  - Voeg de bouillon, de tomatenblokjes en de linzen toe en breng het aan de kook.
  - Laat de linzensoep ongeveer 10 tot 15 minuten zachtjes koken.
  - Pureer de soep glad met een staafmixer of in een blender.
  - Breng de rode linzensoep op smaak met wat chilivlokken en zout.
  - Giet de soep in kommen. Garneer de soep met een eetlepel zure room (of kwark) en wat vers gehakte peterselie.
tips:
  - Lekker met naanbrood of platbrood.
  - Geen garam masala? Gebruik kerriepoeder of ras el hanout.
  - Maak de soep romiger met een scheutje kokosmelk in plaats van zure room.
