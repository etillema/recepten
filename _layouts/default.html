<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <main class="container">
    {{ content }}
  </main>
  <script>
    const palette = [{% for color in site.data.colors %}"{{ color }}"{% unless forloop.last %},{% endunless %}{% endfor %}];
    document.querySelectorAll('.categorie-card, .recept-card').forEach(el => {
      el.style.backgroundColor = palette[Math.floor(Math.random() * palette.length)];
    });
  </script>
</body>
</html>
