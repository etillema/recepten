naam: Gekarameliseerde pastinaak
categorie: Bijgerecht
keuken: Nederlands
bereidingstijd: 30
ingredienten:
- 400 gram pastinaak
- 300 gram sjarlotten
- boter
- 1 eetlepel appelstroop
stappen:
- Snijd de pastinaak in stukken van circa 4 centimeter.
- Deel de sjarlotten in parten.
- Verhit de boter in een hapjespan en bak de pastinaak en sjarlotten in circa 20 minuten gaar.
- Voeg de laatste 10 minuten de appelstroop toe.
tips:
- Lekker met een gebakken biefstukje of entrecote.
- Saus cooked met boter, blaadjes van 6 takjes verse tijm, 2 kruidnagels, 30 cl blond bier en 2 eetlepels appelstroop aan het bakvet toe en laat de saus iets inkoken. Lekker met aardappelpuree.
