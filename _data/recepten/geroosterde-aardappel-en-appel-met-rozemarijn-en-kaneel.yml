naam: Geroosterde aardappel en appel met rozemarijn en kaneel
categorie: Bijgerecht
keuken: Nederlands
bereidingstijd: 15
oventemperatuur: 180
oventijd: 30
ingredienten:
- 600 gram Roseval aardappel
- 4 stuks Elstar appel
- 2 takjes rozemarijn
- 1 rode ui
- 2 kaneelstokjes
- 4 eetlepels olijfolie
- 1 eetlepel citroensap
- peper en zout
stappen:
- Maak de appel en aardappel schoon.
- Snijd de appel en aardappel in partjes.
- Meng alle ingrediënten door elkaar en doe het in een ovenschaal.
- Breng het op smaak met peper en zout.
- Zet de overschaal 30 minuten in de oven op 180 graden.
