naam: Cantharellentaart
categorie: Ovengerecht
keuken: Frans
bereidingstijd: 30
wachttijd: 15 minuten (deeg rusten in koelkast)
oventemperatuur: 190
oventijd: 55
ingredienten:
- Deeg
- 125 gram bloem
- 60 gram boter
- 1 ei
- 2 eetlepels water
- snufje zout
- Vulling
- 2 blaadjes salie
- 500 gram cantharellen
- 2 eieren
- 125 ml slagroom
- peper en zout
- 70 gram Gruyère kaas
stappen:
- Meng de bloem, de boter, het ei, het water en het zout tot een soepel deeg. Laat het deeg 15 minuten in de koelkast rusten.
- Bekleed een ingevetbakblik met het deeg en bak het deeg met een blindvulling 15 minuten voor op 190 graden.
- Snijd de cantharellen en salie in repen. Bak in een droge koekenpan de cantharellen en de salie. Breng het mengsel op smaak met peper en zout.
- Klop de eieren en slagroom samen en voeg wat peper en zout toe.
- Rasp de Gruyère kaas.
- Verdeel de cantharellen over de deegbodem en schenk het slagroommengsel erover. Verdeel de kaas over de cantharellen.
- Bak de taart in 40 minuten op 190 graden af.
tags:
