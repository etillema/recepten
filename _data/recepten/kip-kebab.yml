naam: Kip Kebab
categorie: Ovengerecht
keuken: Aziatisch
bereidingstijd: 25
ingredienten:
- 24 gedroogde abrikozen
- 750 gram kipfilet
- 1 theelepel kerrie
- 1 mango
- 3 eetlepels sinaasappelsap
- 200 ml magere yoghurt
- 1 eetlepel honing
- peper en zout
- olie
- 12 satestokjes
stappen:
- Week de abrikozen in water.
- Snijd de kip in blokjes en meng de olie, kerrie, peper en zout erbij.
- Meng mangoblokjes met de yoghurt, sinaasappelsap en honing tot een glad sausje.
- Maak satestokjes klaar met om en om kip en abrikoos.
- Bak of grill de stokjes.
tips:
- Lekker met rijst of stokbrood.
- Vervang de mango in het sausje door perzikken of nectarines.
