naam: Stoofperen in port
categorie: Bijgerecht
bereidingstijd: 15
personen: 5
ingredienten:
  - 10 peren
  - 1/2 citroen
  - 3 tot 4 blaadjes laurier
  - 1 cm gember, in schijfjes
  - 2 kaneelstokjes
  - 1 theelepel venkelzaad
  - 750 ml witte wijn
  - 150 gram suiker
stappen:
  - Schil de peren en laat het steeltje zitten.
  - Breng de witte wijn met de suiker, het sap van de halve citroen, laurier, gember, kaneelstokjes en venkelzaad aan de kook.
  - Leg de peren in de pan en laat ze circa 1 uur op laag vuur stoven tot ze zacht zijn.
  - Neem de peren uit de pan en laat de saus eventueel nog iets inkoken.
tags:
