naam: Gegratineerde tagliatelle met oesterzwam
categorie: Pasta en Rijst
keuken: Italiaans
bereidingstijd: 30
oventemperatuur: 175
oventijd: 15
ingredienten:
- 150 gram oesterzwammen
- 150 gram katenspek
- tagliatelle
- 25 gram boter
- 2 eetlepels bloem
- melk
- peper en zout
- 75 gram geraspte kaas
stappen:
- Kook de tagliatelle gaar.
- Snijd de katenspek in reepjes en bak deze bruin. Snijd de oesterzwammen in reepjes
  en voeg deze aan de spek toe.
- Smelt de boter en voeg 2 eetlepels bloem toe. Bak de bloem gaar.
- Voeg een scheut melk toe, tot er een romige saus ontstaat.
- Voeg peper en zout aan de saus toe.
- Meng 50 gram van de geraspte kaas aan de saus toe.
- Meng de tagliatelle, het spek/oesterzwammen mengsel en de saus door elkaar en doe
  het in een ingevette ovenschaal.
- Verdeel het restant kaas over de overschaal en bak de gratin in circa 15 minuten
  op 175 graden af.
tags:
- hoofdgerecht
- gratin
- pasta
- oesterzwam
- oven
