naam: Spaghetti paprika olijf
categorie: Pasta en Rijst
keuken: Italiaans
bereidingstijd: 25
personen: 2
ingredienten:
  - 1 paprika
  - 2 rijpe tomaten
  - 100 gram groene olijven
  - een beetje Parmezaanse kaas
  - 2 eetlepels olijfolie
  - peper en zout
  - 150 gram spaghetti
stappen:
  - Snijd de paprika en tomaat in grove stukjes.
  - Verhit de olijfolie en voeg de paprika, tomaat en olijven toe. Laat dit 15 minuten pruttelen.
  - Voeg peper en zout naar smaak toe.
  - Kook de spaghetti.
  - Serveer met geraspte Parmezaanse kaas.
tags:
