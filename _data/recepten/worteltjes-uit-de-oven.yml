naam: Worteltjes uit de oven
categorie: Bijgerecht
keuken: Nederlands
bereidingstijd: 10
oventemperatuur: 180
oventijd: 30
ingredienten:
- worteltjes
- 2 a 3 takjes rozemarijn
- gemalen amandel
- 2 eetlepels honing
- beetje olijfolie
stappen:
- Snijd de worteltjes in blokjes.
- Meng de honing, olijfolie en de amandel door de worteltjes en verdeel het mengsel in een ovenschaal.
- Leg de rozemarijn tussen de worteltjes.
- Zet de overschaal 30 minuten in de oven op 180 graden.
tags:
