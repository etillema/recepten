naam: Spitskooltaart
categorie: Ovengerecht
keuken: Nederlands
bereidingstijd: 20
oventemperatuur: 200
oventijd: 30
ingredienten:
- 300 gram spitskool
- 9 plakjes bladerdeeg
- 300 gram rundergehakt
- een zakje nasi of vleeskruiden
- 2 appels
- kaneel
- suiker
- ei
stappen:
- Bekleed een taartvorm met de bladerdeeg.
- Bak de gehakt met de kruiden rul.
- Snijd de spitskool in repen.
- Schil de appel en snijd deze in stukjes. Bestrooi wat kaneel en suiker over de appel.
- Vul het met bladerdeeg beklede bakblik eerst met de gehakt.
- Verdeel vervolgens de spitskool over de gehakt.
- Verdeel de appel over de spitskool.
- Dek de taart af met bladerdeeg.
- Bak de taart in 30 minuten op 200 graden af.
tags:
- hoofdgerecht
