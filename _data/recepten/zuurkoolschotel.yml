naam: Zuurkoolschotel
categorie: Ovengerecht
keuken: Nederlands
bereidingstijd: 45
oventemperatuur: 175
oventijd: 30
personen: 4

ingredienten:
  - 1 pakje zuurkool
  - 1 appel
  - 1 blokje kippebouillon
  - 5 jeneverbessen
  - aardappelen
  - 10g schouderham in blokjes
  - 300g gehakt
  - 150g champignons
  - 1 theelepel kaneel
  - 2 theelepels kerrie
  - 1 theelepel komijn
  - 1 theelepel koriander
  - beetje Griekse yoghurt
  - beetje boter
  - peper en zout

stappen:
  - Knijp de vocht uit de zuurkool. Bak de zuurkool in een beetje boter. Voeg de blokjes appel toe.
  - Voeg de jeneverbes en kippebouillon toe en laat de zuurkool met een beetje vocht circa 30 minuten stoven.
  - Kook de aardappelen gaar en maak hiervan puree.
  - Bak de hamblokjes in een beetje boter. Voeg de gehakt toe en bak dit rul. Voeg de plakjes champignons toe en bak deze mee.
  - Voeg de kaneel, kerrie, komijn en koriander toe. Voeg de yoghurt toe.
  - Verdeel de zuurkool, gehakt en aardappelpuree over een ovenschaal en bak deze 30 minuten op 175 graden af.

