naam: Quiche Lorraine
categorie: Ovengerecht
keuken: Frans
bereidingstijd: 30
wachttijd: 1 uur (deeg rusten in koelkast)
oventemperatuur: 200
oventijd: 40
ingredienten:
- 125 g koude boter
- 250 g bloem
- 5 eieren
- 1 tl zout
- 1 tl koud water
- 200 g gerookt ontbijtspek
- 150 ml melk
- 250 g crème fraîche
- 120 g geraspte gruyère
stappen:
- Snijd de boter in blokjes en meng met de bloem. Kneed met 1 ei, zout en water zo kort mogelijk tot soepel deeg. Laat het in vershoudfolie 1 uur rusten in de koelkast.
- Vet de vorm in en bestuif met bloem.
- Rol het deeg uit. Bekleed de vorm met het deeg. Druk aan en snijd overtollig deeg bij de randen eraf. Prik met een vork gaatjes in de bodem.
- Verwarm de oven voor op 200 Â°C. Snijd het spek in kleine blokjes. Bak de spekjes kort uit in een koekenpan.
- Meng in een kom de rest van de eieren, de melk, crème fraîche en kaas en breng op smaak met peper.
- Verdeel de spekjes over de bodem en schenk de vulling in de quichevorm.
- Bak de quiche ca. 40 minuten in het midden van de oven.
