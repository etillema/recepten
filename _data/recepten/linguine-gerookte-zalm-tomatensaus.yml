naam: Linguine gerookte zalm tomatensaus
categorie: Pasta en Rijst
keuken: Italiaans
bereidingstijd: 25
personen: 2
ingredienten:
  - 1/2 ui
  - 500 gram ontvelde tomaten
  - 120 gram gerookte zalm
  - 1,2 deciliter cognac
  - 1 deciliter slagroom
  - beetje boter
  - peper en zout
  - 150 gram linguine
stappen:
  - Snijd de ui, tomaat en zalm in stukjes.
  - Fruit de ui.
  - Giet de cognac bij de ui en wacht tot de alcohol verdampt is.
  - Voeg de tomaat toe en laat het 10 minuten pruttelen.
  - Kook ondertussen de linguine.
  - Voeg de zalm en slagroom toe en warm alles door.
  - Voeg peper en zout naar smaak toe.
tags:
