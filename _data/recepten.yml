---
- naam: Bruschetta met tomaat
  categorie: Voorgerecht
  keuken: Italiaans
  bereidingstijd: 15
  wachttijd: 30 minuten (tomatenmengsel laten staan)
  ingredienten:
  - rijpe trostomaten of Roma tomaten
  - olijfolie
  - Toscaanse kruiden
  - een teentje knoflook
  - een stevig brood
  - peper en zout
  stappen:
  - Snijd de tomaat in stukjes en meng het met de olijfolie, Toscaanse kruiden en
    peper en zout. Laat het 30 minuten staan.
  - Rooster dikke, met olijfolie besprenkelde plakken brood in een grillpan.
  - Wrijf het warme brood in met een teentje gehalveerde knoflook.
  - Verdeel het tomatenmengsel over het nog warme brood.
  tags:
  - hapjes
  - Italiaans
  - vegetarisch
  - snel klaar
- naam: Pompoensinaasappelsoep
  categorie: Soep
  keuken: Nederlands
  bereidingstijd: 30
  ingredienten:
  - 1 kg pompoen
  - 1 ui
  - 2 teentjes knoflook
  - 1 stuk verse gember
  - 1 rode peper
  - zout
  - flinke scheut olijfolie
  - 4 sinaasappels
  - 100 ml soja cuisine
  - 2 eetlepels pijnboompitten
  stappen:
  - Pompoen wassen en de verhoute stukken eraf snijden.
  - Snijd de pompoen in stukken. Pompoen met pitten met wat water, ui, knoflook, gember
    en spaanse peper opzetten tot het gaar is.
  - De staafmixer erop zetten of het geheel in de keukenmachine pureren.
  - Nog even de kook erover om de inhoudstoffen van de pitten vrij te krijgen.
  - Breng de soep op smaak met wat zout en voeg een flinke scheut olijfolie toe.
  - 2 sinaasappelen uitpersen en van de andere 2 sinaasappelen de partjes fileren.
  - Al het sap bij de soep doen en op het laatste moment de sinaasappelpartjes, pijnboompitten
    en soja-cuisine toevoegen.
  tags:
  - soep
  - pompoen
  - sinaasappel
  - vegetarisch
  - vegan
- naam: Erwtensoep
  categorie: Soep
  keuken: Nederlands
  bereidingstijd: 2
  ingredienten:
  - 250 gram spliterwten
  - 1 1/4 liter water
  - 100 gram rookspek
  - 250 gram hamlappen
  - 2 bouillonblokjes
  - peper
  - laurier
  - 1/4 knolselderij
  - 1 ui
  - 1 prei
  - 1 aardappel
  - 1 winterwortel
  - kruidnagelpoeder
  - rookworst
  - zout
  stappen:
  - Spliterwten wassen en in water aan de kook brengen. Schuim met schuimspaan verwijderen.
  - Rookspek, hamlappen, bouillonblokjes, peper en laurierblad toevoegen en circa
    1 uur laten koken.
  - Knolselderij, ui, prei, aardappel en winterpeen in blokjes snijden en aan de soep
    toevoegen. Soep nogmaals een uur laten koken.
  - Rookworst in de soep of separaat verwarmen. Soep op smaak brengen met peper en
    zout.
  tags:
  - soep
  - erwten
  - rookworst
  - winters
  - Nederlands
- naam: Spinaziesoep
  categorie: Soep
  keuken: Nederlands
  bereidingstijd: 30
  ingredienten:
  - 3 vastkokende aardappelen
  - 150 gram gesneden ui
  - 750 ml runderbouillon
  - 450 gram spinazie
  - 2 teentjes knoflook
  - 250 gram ravioli spinazie / ricotta
  - 200 gram hamreepjes
  stappen:
  - Schil de aardappel en snijd ze in blokjes van 1 x 1 cm.
  - Fruit de ui en knoflook.
  - Voeg de aardappelblokjes, spinazie en bouillon toe en laat de soep circa 15 minuten
    koken.
  - Kook in de tussentijd de ravioli beetgaar en snijd de ham in reepjes.
  - Pureer de soep met de staafmixer.
  - Serveer de soep met de ravioli en beenham in een diep bord.
  tags:
  - soep
  - spinazie
  - ravioli
  - snel klaar
- naam: Salade met brie en amandel
