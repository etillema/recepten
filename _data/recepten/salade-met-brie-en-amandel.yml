naam: Salade met brie en amandel
categorie: Salades
keuken: Frans
bereidingstijd: 15
ingredienten:
- sla
- brie
- olijfolie
- frambozenazijn
- amandel
- kaneel
- peper en zout
- compote aalbessen
stappen:
- Maak de sla schoon en verdeel deze in porties.
- Maak een vinaigrette van de olie, azijn, peper en zout en kaneel.
- Rooster de amandel goudbruin.
- Verwarm de plakjes brie in een koekenpan.
- Verdeel de brie, amandel, vinaigrette en compote over de salade.
tags:
- salade
