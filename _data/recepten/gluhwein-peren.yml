naam: Glühwein peren
categorie: Bijgerecht
bereidingstijd: 15
personen: 6
ingredienten:
  - 12 peren
  - 4 jeneverbessen
  - 200 gram suiker
  - 900 ml rode wijn
  - 1 sinaasappel
  - 2 kruidnagels
  - 1 kaneelstokje
  - takje rozemarijn
stappen:
  - Schil de peren en laat het steeltje zitten.
  - Breng de rode wijn met de suiker, jeneverbessen, kruidnagels, kaneelstokje en rozemarijn aan de kook.
  - Snijd de sinaasappel in plakken en voeg deze toe.
  - Leg de peren in de pan en laat ze circa 1 uur op laag vuur stoven tot ze zacht zijn.
  - Neem de peren uit de pan en laat de saus eventueel nog iets inkoken.
tags:
