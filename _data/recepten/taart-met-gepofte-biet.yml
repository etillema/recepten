naam: Taart met gepofte biet
categorie: Ovengerecht
keuken: Nederlands
bereidingstijd: 30
personen: 6
oventemperatuur: 200
oventijd: 150
wachttijd:
ingredienten:
  - 4 bieten
  - olijfolie
  - 6 bereide stoofperen
  - 8 plakjes bladerdeeg
  - 3 eieren
  - 250 ml slagroom
  - 1 eetlepel karwijzaad
  - 150 gram verse geitenkaas
  - peper en zout
  - aluminium folie
stappen:
  - Maak de bieten schoon. Besprenkel ze met olijfolie en bestrooi met peper en zout. Pak de bieten in aluminium folie.
  - Pof de bieten 1,5 uur op 200 graden in de oven.
  - Pel de bieten na het poffen.
  - Bekleed een taartvorm met de bladerdeeg. Prik gaatjes in het deeg en bak het bladerdeeg 20 a 25 minuten blind af.
  - Verwijder de blindvulling en bak het deeg nog 5 tot 10 minuten bruin.
  - Snijd de bieten in stukjes. Snijd de stoofperen in stukjes. Verdeel de biet en peer over de taartbodem.
  - Meng de slagroom en eieren met peper en zout. Verdeel dit over de peer en biet. Verdeel hierover de geitenkaas.
  - Bak de taart in 25 minuten op 200 graden af.
tags:
  - hartige taart
  - biet
  - stoofperen
  - geitenkaas
  - oven
  - vegetarisch
