  bereidingstijd: 15
  ingredienten:
  - sla
  - brie
  - olijfolie
  - frambozenazijn
  - amandel
  - kaneel
  - peper en zout
  - compote aalbessen
  stappen:
  - Maak de sla schoon en verdeel deze in porties.
