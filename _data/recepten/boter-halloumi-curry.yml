naam: Boter Halloumi Curry
categorie: Pasta en Rijst
bereidingstijd: 25
personen: 4
ingredienten:
  - 250 gram halloumi, in plakken gesneden
  - 2 teentjes knoflook, fijngehakt
  - 1 theelepel gember, fijngehakt
  - 2 hele kruidnagels
  - 1 kardemompeul, alleen de zaadjes
  - 1 theelepel gemalen koriander
  - 1 theelepel kurkuma
  - 1 theelepel garam masala
  - 1 theelepel chilipoeder
  - 240 milliliter tomatenpassata
  - 3 eetlepels tomatenpuree
  - 1 eetlepel vers citroensap
  - 80 milliliter room
  - 30 gram boter
stappen:
  - Bak de knoflook, gember, kardemom en kruidnagels in de gesmolten boter.
  - Voeg de specerijen toe en bak tot het geurig is. Meng de tomatenpuree erdoor.
  - Voeg de tomatenpassata en het citroensap toe; laat het op laag vuur sudderen.
  - Bak de halloumi in een aparte pan tot ze goudbruin zijn.
  - Roer de room en de boter door de saus en voeg de halloumi toe.
tips:
  - Serveer met rijst.
  - Voeg spinazie, kikkererwten of geroosterde groenten toe om het naar eigen smaak aan te passen.
tags:
  - hoofdgerecht
  - curry
  - halloumi
  - vegetarisch
  - snel klaar
