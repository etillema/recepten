- naam: Gegratineerde tagliatelle met oesterzwam
  categorie: Pasta en Rijst
  keuken: Italiaans
  bereidingstijd: 30
  oventemperatuur: 175
  oventijd: 15
  ingredienten:
  - 150 gram oesterzwammen
  - 150 gram katenspek
  - tagliatelle
  - 25 gram boter
  - 2 eetlepels bloem
  - melk
  - peper en zout
  - 75 gram geraspte kaas
  stappen:
  - Kook de tagliatelle gaar.
  - Snijd de katenspek in reepjes en bak deze bruin. Snijd de oesterzwammen in reepjes
    en voeg deze aan de spek toe.
  - Smelt de boter en voeg 2 eetlepels bloem toe. Bak de bloem gaar.
  - Voeg een scheut melk toe, tot er een romige saus ontstaat.
  - Voeg peper en zout aan de saus toe.
  - Meng 50 gram van de geraspte kaas aan de saus toe.
  - Meng de tagliatelle, het spek/oesterzwammen mengsel en de saus door elkaar en
    doe het in een ingevette ovenschaal.
  - Verdeel het restant kaas over de overschaal en bak de gratin in circa 15 minuten
    op 175 graden af.
  tags:
  - hoofdgerecht
  - gratin
  - pasta
  - oesterzwam
  - oven
- naam: Boef Bourguignon
  categorie: Stoofgerecht
  keuken: Frans
  bereidingstijd: 3
  ingredienten:
  - 750 gram rundvlees
  - een restje rode wijn
  - 1 eetlepel bloem
  - 2 laurierblaadjes
  - 4 tot 6 kruidnagels
  - 4 grote uien
  - 125 gram rookspekjes
  - circa 30 zilveruitjes
  - 150 gram champignon
  - 1 blikje tomatenpuree
  - boter
  - peper en zout
  stappen:
  - Snijd de ui in stukjes en bak deze in boter goudbruin. Voeg de spekblokjes toe
    en bak deze mee. Voeg de zilveruitjes toe en laat deze meewarmen.
  - Bak het rundvlees in boter in een braadpan rondom bruin. Meng de bloem door het
    vlees en laat deze bruin kleuren.
  - Voeg het mengsel uien, spek, zilveruitjes aan het vlees toe. Voeg de laurier en
    de kruidnagel toe en laat het vlees 2,5 tot 3 uur stoven.
  - Voeg aan het eind de tomatenpuree en de fijngesneden champignons toe. Maak het
    geheel op smaak met peper en zout.
  tips:
  - Lekker met aardappelpuree.
  tags:
  - stoofvlees
  - rundvlees
  - Frans
  - rode wijn
  - winters
- naam: Vlaams stoofvlees
  categorie: Stoofgerecht
  keuken: Belgisch
  bereidingstijd: 3
  ingredienten:
  - 1 kilo rundvlees
  - boter
  - 3 grote uien
  - 1 eetlepel honing
  - 3 takjes tijm
  - 2 kruidnagels
  - 1 blaadje laurier
  - 2 plakken witbrood
  - 2 eetlepels mosterd
  - 75 ml donker bier
  - peper en zout
  stappen:
  - Snijd de ui fijn en fruit deze goudbruin. Bestrooi de blokjes rundvlees met peper
    en zout, en bak deze in een braadpan rondom bruin.
  - Voeg de uien bij het vlees. Voeg de honing, de tijm, kruidnagel en laurier aan
    het vlees toe.
  - Bestrijk de boterhammen aan een zijde met mosterd en leg deze met de mosterdzijde
    op het vlees.
  - Schenk het bier over het vlees, totdat het vlees bedekt is. Laat het vlees 2,5
    tot 3 uur stoven tot het vlees gaar is.
  tips:
  - Serveren op zijn Vlaams met friet.
  tags:
  - stoofvlees
  - rundvlees
  - Belgisch
  - bier
  - winters
- naam: Kalkoenfilet uit de oven
  categorie: Ovengerecht
  keuken: Nederlands
  bereidingstijd: 20
  oventemperatuur: 180
  oventijd: 25
  ingredienten:
  - 75 gram gedroogde abrikozen
  - 2 eetlepels pistachenootjes
  - 100 gram roomkaas
  - 1 eetlepel honing
  - 4 kalkoenschnitzels
  - 300 gram katenspek
  stappen:
  - Snijd de abrikozen fijn, hak de pistachenootjes fijn. Meng de abrikozen, nootjes,
    roomkaas en honing.
  - Rol de kalkoenschnitzels extra plat.
  - Bestrooi de kalkoenschnitzels met peper en zout.
  - Verdeel de roomkaas over de kalkoenfillet.
  - Rol de kalkoenfillet op en wikkel de kalkoenfillet in de katenspek.
  - Leg de kalkoenfillet in een ovenschaal.
  - Bak de kalkoenfillet in 25 minuten op 180 graden gaar.
  tags:
  - vlees
  - kalkoen
  - oven
  - feestelijk
- naam: Scones
  categorie: Taart en koekjes
  keuken: Engels
  bereidingstijd: 25
  oventemperatuur: 200
  oventijd: 10
  ingredienten:
  - 250 gram bloem
  - 2,5 theelepel bakpoeder
  - zout
  - 50 gram boter
  - 1 zakje vanillesuiker
  - 2 eetlepels suiker
  - 0,75 liter melk
  - 1 ei
  - mascarpone
  - creme fraiche
  - jam
  stappen:
  - Bloem met bakpoeder en zout boven kom zeven.
  - Vanillesuiker en suiker toevoegen.
  - Boter in kleine stukjes snijden en mengen met bloem.
  - Ei met melk loskloppen en bij bloemmengsel gieten.
  - Het geheel tot een samenhangende bal kneden.
  - Deeg tot lap van ca. 2,5 cm dik uitrollen.
  - Uit deeg 8 rondjes steken, op bakblik leggen en met de rest van de melk bestrijken.
  - In het midden van de oven op 200 graden in 10 minuten lichtbruin bakken.
  tags:
  - bakken
  - Engels
  - scones
  - oven
- naam: Applecrumble
  categorie: Nagerecht
  keuken: Engels
  bereidingstijd: 15
  oventemperatuur: 175
  oventijd: 30
  ingredienten:
  - 5 appels
  - sinaasappelsap
  - 1 theelepel gemalen kruidnagel
  - 100 gram suiker
  - 50 gram bloem
  - 6 eetlepels havermout
  - 65 gram gemalen hazelnoot
  - 75 gram boter
  - creme fraiche
  stappen:
  - Schil de appel en snijd deze in blokjes. Meng de sinaasappel en kruidnagel met
    de appel.
  - Meng de suiker, bloem, havermout, hazelnoot en boter tot een kruimeldeeg.
  - Doe de appel in ovenschaaltjes en verdeel het kruimeldeeg erover.
  - Bak de appelcrumble in circa 30 minuten op 175 graden af.
  tips:
  - Serveren met een beetje creme fraiche.
  tags:
  - bakken
  - Engels
  - appel
  - crumble
  - oven
