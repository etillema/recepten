naam: Pie met pruimen en appel
categorie: Ovengerecht
bereidingstijd: 30
oventemperatuur: 180
oventijd: 45
ingredienten:
  - "Vulling:"
  - 1kg magere runderlapjes (in blokjes)
  - 4 eetlepels olie
  - 2 uitjes (gesnipperd)
  - 1 eetlepel tomatenpuree
  - 2 eetlepels bloem
  - 200ml donker bier of rode wijn
  - 300ml runderbouilion (van tablet of pot)
  - 1 eetlepel honing
  - 1 kaneelstokje
  - 2 kruidnagels
  - 100g gedroogde pruimen (in kwartieren)
  - 50g gedroogde appels
  - "Deeg:"
  - 500g bloem
  - 2 eetlepels bloem (om te bestuiven)
  - 250g boter (koud, in blokjes)
  - 1 ei (losgeklopt)
stappen:
  - >
    Bestrooi één dag van tevoren het vlees met zout en flink wat peper. Verhit 3 eetlepels olie in een grote braadpan en
    braad hierin de blokjes vlees bruin. Schep het laatste vlees uit de pan, zet
    de warmtebron lager en voeg de rest van de olie toe. Roer de aanbaksels los van de bodem en fruit de ui in een paar
    minuten lichtbruin in het bakvet. Voeg al het vlees, de tomatenpuree en bloem toe en bak al roerend even door.
  - >
    Giet het bier erbij en breng aan de kook. Voeg de bouillon, honing, kaneel en kruidnagel toe en breng op middelhoge
    stand aan de kook. Zet de warmtebron lager en stoof het vlees afgedekt in circa 2 uur gaar. Voeg na 1,5 uur de
    pruimen en appel toe. Breng de stoof op smaak met zout en peper en laat afkoelen.
  - >
    Meng de bloem en de boter met koele vingers tot een kruimelig deeg. Voeg 2-3 eetlepels ijskoud water toe tot het
    deeg goed bij elkaar blijft. Laat minimaal 30 minuten rusten in de koelkast.
  - >
    Verwarm de oven voor op 180 graden. Rol het deeg tot een lap en bedek hiermee een ovenschaal. Doe de vulling in de
    ovenschaal. Rol de rest van het deeg uit tot een deksel. Bestrijk het deeg met het eimengsel. Bak de ovenschotel
    drie kwartier in de oven totdat de korst mooi goudbruin gekleurd is.
