<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      if (stored) {
        document.documentElement.setAttribute('data-theme', stored);
      }
    })();
  </script>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Schakel thema"></button>
  <main class="container">
    {{ content }}
  </main>
  <script>
    var lightPalette = [{% for color in site.data.colors.light %}"{{ color }}"{% unless forloop.last %},{% endunless %}{% endfor %}];
    var darkPalette  = [{% for color in site.data.colors.dark  %}"{{ color }}"{% unless forloop.last %},{% endunless %}{% endfor %}];

    function isDark() {
      var theme = document.documentElement.getAttribute('data-theme');
      if (theme === 'dark') return true;
      if (theme === 'light') return false;
      return window.matchMedia('(prefers-color-scheme: dark)').matches;
    }

    function applyPalette() {
      var palette = isDark() ? darkPalette : lightPalette;
      document.querySelectorAll('.categorie-card, .recept-card').forEach(function(el) {
        el.style.backgroundColor = palette[Math.floor(Math.random() * palette.length)];
      });
    }

    var iconSun  = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/><line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/><line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/><line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/></svg>';
    var iconMoon = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>';

    function updateToggleLabel() {
      document.getElementById('themeToggle').innerHTML = isDark() ? iconSun : iconMoon;
    }

    document.getElementById('themeToggle').addEventListener('click', function() {
      var current = document.documentElement.getAttribute('data-theme');
      var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var currentlyDark = current === 'dark' || (!current && systemDark);
      var next = currentlyDark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateToggleLabel();
      applyPalette();
    });

    applyPalette();
    updateToggleLabel();

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
      if (!localStorage.getItem('theme')) {
        updateToggleLabel();
        applyPalette();
      }
    });
  </script>
</body>
</html>
