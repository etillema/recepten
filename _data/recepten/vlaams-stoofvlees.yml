naam: Vlaams stoofvlees
categorie: Stoofgerecht
keuken: Belgisch
bereidingstijd: 3
ingredienten:
- 1 kilo rundvlees
- boter
- 3 grote uien
- 1 eetlepel honing
- 3 takjes tijm
- 2 kruidnagels
- 1 blaadje laurier
- 2 plakken witbrood
- 2 eetlepels mosterd
- 75 ml donker bier
- peper en zout
stappen:
- Snijd de ui fijn en fruit deze goudbruin. Bestrooi de blokjes rundvlees met peper
  en zout, en bak deze in een braadpan rondom bruin.
- Voeg de uien bij het vlees. Voeg de honing, de tijm, kruidnagel en laurier aan het
  vlees toe.
- Bestrijk de boterhammen aan een zijde met mosterd en leg deze met de mosterdzijde
  op het vlees.
- Schenk het bier over het vlees, totdat het vlees bedekt is. Laat het vlees 2,5 tot
  3 uur stoven tot het vlees gaar is.
tips:
- Serveren op zijn Vlaams met friet.
tags:
- stoofvlees
- rundvlees
- Belgisch
- bier
- winters
