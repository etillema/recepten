naam: Gegratineerde prei
categorie: Bijgerecht
keuken: Nederlands
bereidingstijd: 25
oventemperatuur: 180
oventijd: 30
ingredienten:
- prei
- plakken spek
- kaas Emmentaler
- boter
- meel
- melk
- peper en zout
stappen:
- Maak de prei schoon, en snijd lange rechte stukken uit de prei. Kook de prei circa 10 minuten in water met een beetje zout.
- Maak een bechamelsausje van de boter, meel en melk en maak deze op smaak met peper en zout.
- Rasp de kaas.
- Rol de spek om de prei en leg deze naast elkaar in een ingevette ovenschaal.
- Verdeel de bechamelsaus en de kaas over de prei.
- Gratineer de prei circa 30 tot 45 minuten in de oven op 180 graden.
tips:
- Ook zonder bechamelsaus erg lekker.
