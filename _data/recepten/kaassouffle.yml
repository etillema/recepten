naam: Kaassouffle
categorie: Ovengerecht
keuken: Frans
bereidingstijd: 20
oventemperatuur: 175
oventijd: 30
personen: 4

ingredienten:
  - 30 gram boter
  - 40 gram bloem
  - 300 milliliter melk
  - 4 eieren
  - 120 gram kaas
  - 10 gram maizena
  - peper en zout

stappen:
  - Smelt de boter en voeg de bloem toe. Klop de melk er doorheen.
  - Voeg de eierdooiers toe.
  - Meng de kaas, maizena, peper en zout door het bloempapje.
  - Klop de eiwitten stijf.
  - Spatel het eiwit bij het bloempapje.
  - Doe het mengsel in een souffléschaal en bak in circa 30 minuten op 175 graden af.

tags:
