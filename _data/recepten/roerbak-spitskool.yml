naam: Roerbak spitskool
categorie: Hoofdgerecht
keuken: Nederlands
bereidingstijd: 25
ingredienten:
- 500 gram spitskool
- 250 gram cherry tomaatjes
- 2 middelgrote uien
- 125 gram braadworst
- 250 milliliter groentebouillon
- 2 eetlepels olie
- peper en zout
stappen:
- Snijd de uien grof. Snijd de spitskool in repen. Was de tomaten en halveer deze.
- Verhit olie in een grote pan. Snijd de braadworst in stukjes.
- Bak de braadworst 3 a 4 minuten. Voeg de tomaat toe en bak deze even mee. Neem de braadworst en tomaat uit de pan.
- Bak de ui en de spitskool in het braadvet.
- Voeg de bouillon toe en laat het geheel 5 minuten doorkoken.
- Voeg aan het eind de braadworst en de tomaat toe om nog even mee te warmen.
tips:
- Lekker met rijst.
tags:
- hoofdgerecht
- spitskool
- braadworst
- snel klaar
