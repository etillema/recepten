naam: Kerskriekenbiersaus
categorie: Bijgerecht
keuken: Belgisch
bereidingstijd: 25
ingredienten:
  - 1 sjalotje
  - 25 gram boter
  - 25 gram bloem
  - 3 takjes verse tijm
  - 250 milliliter kriekbier
  - 1 pot kersen
  - 3 eetlepels ahornsiroop
stappen:
  - Laat de kersen uitlekken.
  - Snipper het sjalotje en fruit deze in de boter.
  - Voeg de bloem toe aan de boter en laat de roux een paar minuten garen.
  - Voeg het sap van de kersen en het kriekbier voorzichtig al roerend toe aan de saus.
  - Voeg de ahornsiroop, de tijm en de helft van de kersen toe aan de saus en laat de saus inkoken.
  - Zeef de saus en warm deze opnieuw door. Voeg de andere helft van de kersen en nog een beetje ahornsiroop toe aan de saus.
tips:
  - Lekker met bijvoorbeeld een gebakken varkenshaasje.
tags:
  - saus
  - kriekbier
  - kersen
  - Belgisch
  - feestelijk
