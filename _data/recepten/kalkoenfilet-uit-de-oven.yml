naam: Kalkoenfilet uit de oven
categorie: Ovengerecht
keuken: Nederlands
bereidingstijd: 20
oventemperatuur: 180
oventijd: 25
ingredienten:
- 75 gram gedroogde abrikozen
- 2 eetlepels pistachenootjes
- 100 gram roomkaas
- 1 eetlepel honing
- 4 kalkoenschnitzels
- 300 gram katenspek
stappen:
- Snijd de abrikozen fijn, hak de pistachenootjes fijn. Meng de abrikozen, nootjes,
  roomkaas en honing.
- Rol de kalkoenschnitzels extra plat.
- Bestrooi de kalkoenschnitzels met peper en zout.
- Verdeel de roomkaas over de kalkoenfillet.
- Rol de kalkoenfillet op en wikkel de kalkoenfillet in de katenspek.
- Leg de kalkoenfillet in een ovenschaal.
- Bak de kalkoenfillet in 25 minuten op 180 graden gaar.
tags:
