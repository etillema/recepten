naam: Bloemkool Masala
categorie: Bijgerecht
keuken: Indiaas
bereidingstijd: 30
ingredienten:
- bloemkool
- kleine ui
- teentje knoflook
- tomatenpuree
- kerrie
- beetje olie
stappen:
- Snipper de ui in stukjes en hak de knoflook fijn.
- Maak de bloemkool schoon en snijd deze in roosjes.
- Fruit de ui en de knoflook in wat olie.
- Voeg de tomatenpuree toe en bak dit even aan zodat de tomatenpuree zoet gaat ruiken.
- Voeg de bloemkool met wat water toe.
- Laat de bloemkool doorkoken tot de bloemkool gaar is.
tips:
- Lekker met gebakken krielaardappeltjes en een stukje vlees.
tags:
- bijgerecht
- groenten
- bloemkool
- Indiaas
- vegetarisch
- kerrie
