naam: Perentaart met geitenkaas en amandel
categorie: Hoofdgerecht
keuken: Frans
bereidingstijd: 15
oventemperatuur: 200
oventijd: 20
ingredienten:
- een paar plakjes bladerdeeg
- twee handperen
- geitenkaas
- 3 eetlepels honing
- een eetlepel tijmblaadjes
- 75 gram amandelschaafsel
- een losgeklopt ei
stappen:
- Ontdooi de bladerdeeg en verspreid het over een bakblik.
- Prik gaatjes in de bladerdeeg en vouw de randen om.
- Schil de peer en snijd het in plakjes.
- Verdeel de stukjes kaas over het bladerdeeg.
- Leg de peerpartjes over de kaas.
- Verdeel de honing, de tijm en het amandelschaafsel.
- Bestrijk de taart met het losgeklopt ei.
- Bak de taart in 15 a 20 minuten af op 200 graden.
tags:
- hoofdgerecht
- hartige taart
- peer
- geitenkaas
- amandel
- oven
- vegetarisch
