naam: Traditionele pie
categorie: Hartige taarten
keuken: Engels
bereidingstijd: 45
oventemperatuur: 180
oventijd: 45
personen: 6

ingredienten:
  - "Deeg:"
  - 300 gram bloem
  - 200 gram koude boter
  - 50 milliliter water
  - snufje zout
  - "Vulling:"
  - 1 kilogram runderlappen
  - scheutje zonnebloemolie
  - 2 uien
  - 3 winterwortels
  - 3 teentjes knoflook
  - 2 takjes tijm
  - snufje chilivlokken
  - 1 kaneelstokje
  - 200 gram spruitjes
  - 100 gram champignons
  - 2 eetlepels honing
  - sap van een halve citroen
  - 1 eetlepel bloem
  - 1 theelepel boter

stappen:
  - Meng de bloem met de boter, zout en water tot een bal. Laat het deeg minimaal een nacht rusten in de koelkast.
  - Snijd het vlees in blokken van 1 cm. Bak het vlees in zonnebloemolie.
  - Haal het vlees uit de pan. Bak de uien en wortels in het vet.
  - Voeg de knoflook, tijm en het vlees weer toe. Meng de kruiden en 150 milliliter water toe en laat minimaal 2 uur stoven. Voeg na 1 uur de spruitjes en champignons toe.
  - Meng de bloem en boter tot een papje en voeg toe aan het gerecht.
  - Verwijder de tijm en het kaneelstokje. Voeg de honing en het citroensap toe. Laat de vulling afkoelen in de koelkast.
  - Verwarm de oven voor op 180 graden. Doe het mengsel in een ovenschaal en bedek met een plak deeg. Maak een gaatje om de damp te laten ontsnappen.
  - Bak de pie in 45 minuten tot een uur af.

