naam: Duitse Krautsalat
categorie: Salades
bereidingstijd: 15
personen: 6
ingredienten:
  - 1 witte kool
  - 1/2 groene paprika
  - 1 kleine ui
  - 100 ml zonnebloemolie
  - 150 ml kruidenazijn of witte wijn azijn
  - 150 ml suiker
  - 1/2 eetlepel zout
  - 1/2 eetlepel mosterd
stappen:
  - Snijd de kool en de paprika in repen. Snijd de ui heel fijn.
  - Breng de olie, azijn, suiker, zout en mosterd aan de kook.
  - Giet de warme dressing over de kool.
  - Doe de salade in een grote schaal en laat de salade minstens twee dagen staan. Roer de salade minstens 1 maal per dag door.
tags:
